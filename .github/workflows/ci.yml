# backend CI
# Runs on every push / PR to main.
# Installs deps, type-checks, lints, and runs the full pytest suite.

name: backend CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: self-hosted
    defaults:
      run:
        shell: pwsh
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff mypy

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: Type-check with mypy
        run: mypy app/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true   # warn only until full type coverage is reached

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-backend-${{ matrix.python-version }}
          path: coverage.xml

  # ── Smoke test (dry-run) ────────────────────────────────────────────────────
  dry-run:
    name: Smoke – dry run
    runs-on: self-hosted
    defaults:
      run:
        shell: pwsh
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Dry-run main module
        run: python -m app.main --help
        continue-on-error: true   # remove once --dry-run is implemented

  # ── Notify ci-cd repo ──────────────────────────────────────────────────────
  notify-ci-cd:
    name: Notify GardenStation-ci-cd
    runs-on: self-hosted
    defaults:
      run:
        shell: pwsh
    needs: [test, dry-run]
    if: always()
    steps:
      - name: Dispatch backend-changed
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          script: |
            const branch = context.payload.pull_request
              ? context.payload.pull_request.head.ref
              : context.ref.replace(/^refs\/heads\//, '');
            const prNumber = context.payload.pull_request ? context.payload.pull_request.number : null;
            const status = '${{ needs.test.result }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createDispatchEvent({
              owner: 'AutomatedAIGardenStation',
              repo: 'pipeline-orchestrator',
              event_type: 'backend-changed',
              client_payload: { branch, pr_number: prNumber, status }
            });
            console.log(`Dispatched backend-changed (${status})`);
